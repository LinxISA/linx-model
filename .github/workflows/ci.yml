name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: ./tools/ci/run_clang_format_check.sh

  lint-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y clang-tidy cmake ninja-build g++
      - name: Configure
        run: cmake -S . -B build-tidy -G Ninja
      - name: Run clang-tidy
        run: ./tools/ci/run_clang_tidy.sh build-tidy

  lint-md:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2
      - name: Run markdownlint
        run: ./tools/ci/run_markdownlint.sh

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++
      - name: Configure
        run: cmake -S . -B build-${{ matrix.build_type }} -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
      - name: Build
        run: cmake --build build-${{ matrix.build_type }}

  ut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++
      - name: Configure
        run: cmake -S . -B build-unit -G Ninja -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build-unit
      - name: Run unit tests
        run: ctest --test-dir build-unit --output-on-failure -L unit

  st:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++
      - name: Configure
        run: cmake -S . -B build-system -G Ninja -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build-system
      - name: Run system and checks tests
        run: |
          ctest --test-dir build-system --output-on-failure -L system
          ctest --test-dir build-system --output-on-failure -L checks

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang
      - name: Configure
        run: >
          cmake -S . -B build-sanitize -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_COMPILER=clang++
          -DLINX_MODEL_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build-sanitize
      - name: Run tests under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --test-dir build-sanitize --output-on-failure

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Doxygen toolchain
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz cmake ninja-build g++
      - name: Configure
        run: cmake -S . -B build-docs -G Ninja -DLINX_MODEL_BUILD_DOCS=ON
      - name: Build docs
        run: cmake --build build-docs --target docs
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: docs/html

  pages:
    if: github.ref == 'refs/heads/main'
    needs: docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Doxygen toolchain
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz
      - name: Generate docs
        run: ./tools/ci/run_doxygen.sh
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
